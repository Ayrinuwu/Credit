<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кредиты</title>
    <link rel="stylesheet" href="credit_style.css"> 
    <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">

        <div class="header-top">
            <div class= "header-top__container">
                <nav class="header-top__nav">
                    <div class="user-info">
                        <img src="images/Acc.svg" alt="">
                        <span class="user-name">Имя Фамилия</span>
                    </div>
                    <ul class="header-top__list">
                        <img src="images/Contact.svg" alt="">
                        <div class="login">
                            <img src="images/Vector.svg" alt="">
                            <button type="button" class="auth-button">Вход</button>
                        </div>
                    </ul>
                </nav>
            </div>
        </div>

        <div class="line">
            <div class= "line__container">
                <nav class="line__nav">
                    <img src="images/Line 1.svg" alt="">
                </nav>
            </div>        
        </div>

        <div class="header-bottom">
            <div class= "header-bottom__container">
                <nav class="header-bottom__nav">
                    <ul class="header-bottom__list">
                        <li class="header-bottom__list-item">
                            <a class="header-bottom__list-link " href="index.html">Домой</a>
                        </li>
                        <li class="header-bottom__list-item">
                            <a class="header-bottom__list-link active" href="/">Кредиты</a>
                        </li>
                        <li class="header-bottom__list-item">
                            <a class="header-bottom__list-link" href="services.html">Сервисы</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div class="background">
            <form class="credit-form">
                <div class="forms">
                    <p>Сумма</p>
                    <input type="text" placeholder="Введите сумму">
                    <p>Срок</p>
                    <input type="text" placeholder="Введите срок">
                    <p>Ежемесячный доход</p>
                    <input type="text" placeholder="Введите доход">
                    <p>Адрес регистрации</p>
                    <input type="text" placeholder="Введите адрес">
                    <p>Место работы</p>
                    <input type="text" placeholder="Введите наименование организации">
                </div>
                <div class="discription">
                    <p>обязательное поле заполнения</p>
                </div>
                <div class="agreements">
                    <label>
                    <input type="checkbox"> 
                    согласен на обработку персональных данных
                    </label>
                    <br>
                    <label>
                    <input type="checkbox"> 
                    согласен на рассылку
                    </label>
                </div>
            </form>
                <button type="submit" class="credit-button">
                    Оформить
                </button>
        </div>
    
        <div id="modal" class="modal">
            <div class="modal-content">
                <div class="modal-inner">
                    <img src="images/Operation_ok.svg" class="modal-icon">
                    <div class="modal-text-wrapper">
                        <p class="modal-title">Заявка оформлена</p>
                        <p class="modal-title">Банк рассмотрит заявление в течение 1 рабочего дня</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <div id="loginModal" class="login-modal">
        <div class="login-modal-content">
            <div class="login-modal-header">
                <h3>Вход в личный кабинет</h3>
                <span class="close-modal">&times;</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginInput">Логин</label>
                    <input type="text" id="loginInput" placeholder="Введите логин" required>
                </div>
                
                <div class="form-group">
                    <label for="passwordInput">Пароль</label>
                    <input type="password" id="passwordInput" placeholder="Введите пароль" required>
                </div>
                
                <button type="submit" class="login-submit-btn">Войти</button>
            </form>
        </div>
    </div> 
    <script src="index.js"></script>   
    <script src="credit.js"></script>
</body>
</html>
