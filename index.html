<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Получение кредита</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header-top">
        <div class= "header-top__container">
            <nav class="header-top__nav">
                <img src="images/Personal_Acc.svg" alt="">
                <ul class="header-top__list">
                    <img src="images/Contact.svg" alt="">
                    <img src="images/login.svg" alt="">
                </ul>
            </nav>
        </div>
    </header>

    <header class="line">
        <div class= "line__container">
            <nav class="line__nav">
                <img src="images/Line 1.svg" alt="">
            </nav>
        </div>        
    </header>

    <header class="header-bottom">
        <div class= "header-bottom__container">
            <nav class="header-bottom__nav">
                <ul class="header-bottom__list">
                    <li class="header-bottom__list-item">
                        <a class="header-bottom__list-link active" href="/">Домой</a>
                    </li>
                    <li class="header-bottom__list-item">
                        <a class="header-bottom__list-link" href="/">Кредиты</a>
                    </li>
                    <li class="header-bottom__list-item">
                        <a class="header-bottom__list-link" href="/">Сервисы</a>
                    </li>
                </ul>
                <a class="header__button" href="/">Оформить кредит</a>
            </nav>
        </div>
    </header>
    <main>
        <section class="hero">
            <div class="hero__container">
                <div class="hero__content">
                    <div class="hero__card">
                    <img src="images/Card 1.svg" alt="">
                    </div>
                    <div class="hero__buttons">
                        <a class="hero__button" href="/">История</a>
                        <a class="hero__button" href="/">Поддержка</a>
                    </div>
                </div>

            </div>
            <img class="hero__image" src="images/Business.png" alt="">
        
        </section>
    </main>

</body>
</html>
