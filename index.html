<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Домой</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=ABeeZee:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">

        <div class="header-top">
            <div class= "header-top__container">
                <nav class="header-top__nav">
                    <div class="user-info">
                        <img src="images/Acc.svg" alt="">
                        <span class="user-name">Имя Фамилия</span>
                    </div>
                    <ul class="header-top__list">
                        <img src="images/Contact.svg" alt="">
                        <div class="login">
                            <img src="images/Vector.svg" alt="">
                            <button type="button" class="auth-button">Вход</button>
                        </div>
                    </ul>
                </nav>
            </div>
        </div>

        <div class="line">
            <div class= "line__container">
                <nav class="line__nav">
                    <img src="images/Line 1.svg" alt="">
                </nav>
            </div>        
        </div>

        <div class="header-bottom">
            <div class= "header-bottom__container">
                <nav class="header-bottom__nav">
                    <ul class="header-bottom__list">
                        <li class="header-bottom__list-item">
                            <a class="header-bottom__list-link active" href="/">Домой</a>
                        </li>
                        <li class="header-bottom__list-item">
                            <a class="header-bottom__list-link" href="credit.html">Кредиты</a>
                        </li>
                        <li class="header-bottom__list-item">
                            <a class="header-bottom__list-link" href="services.html">Сервисы</a>
                        </li>
                    </ul>
                    <a class="header__button" href="credit.html">Оформить кредит</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero__container">
                <div class="hero__content">
                    <div class="hero__card" id="cardContainer">
                        <div class="card-background">
                            <img src="images/Card 1.svg" alt="Card background" class="card-bg-image">
                        </div>
                        <div class="card-details" id="cardDetails">
                            <div class="card-balance">
                                <span class="card-label">Баланс</span>
                                <span class="card-balance-amount" id="cardBalance">0</span>
                            </div>
                            <div class="card-number">
                                <span class="card-number-value" id="cardNumber">**** **** **** ****</span>
                                <span class="card-expiry-value" id="cardExpiry">**/**</span>
                            </div>
                        </div>
                    </div>
                    <div class="hero__buttons">
                        <a class="hero__button" href="/">История</a>
                        <a class="hero__button" href="/">Поддержка</a>
                    </div>
                </div>
            </div>

            <img class="hero__image" src="images/Business.svg" alt="">
        
        </section>
    </main>
    <div id="loginModal" class="login-modal">
        <div class="login-modal-content">
            <div class="login-modal-header">
                <h3>Вход в личный кабинет</h3>
                <span class="close-modal">&times;</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="loginInput">Логин</label>
                    <input type="text" id="loginInput" placeholder="Введите логин" required>
                </div>
                
                <div class="form-group">
                    <label for="passwordInput">Пароль</label>
                    <input type="password" id="passwordInput" placeholder="Введите пароль" required>
                </div>
                
                <button type="submit" class="login-submit-btn">Войти</button>
            </form>
        </div>
    </div>   
    <script src="index.js"></script>
</body>
</html>
